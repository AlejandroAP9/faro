name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Un proyecto recien creado con `raiz init` todavia no tiene app (el agente
      # la construye). Si no hay package.json, el job es un no-op verde.
      - id: detect
        run: |
          if [ -f package.json ]; then echo "app=true" >> "$GITHUB_OUTPUT"; else echo "app=false" >> "$GITHUB_OUTPUT"; echo "Sin package.json todavia — nada que verificar."; fi

      - if: steps.detect.outputs.app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22          # blindaje: npm 11 / Node 24 rompe el deploy
          cache: npm

      # npm install (no npm ci): sharp trae deps opcionales por-plataforma y el
      # lockfile generado en macOS hace fallar a `npm ci` en Linux (bug conocido).
      - if: steps.detect.outputs.app == 'true'
        run: npm install --no-audit --no-fund

      - if: steps.detect.outputs.app == 'true'
        run: npm run typecheck --if-present

      - if: steps.detect.outputs.app == 'true'
        run: npm run build --if-present
        env:
          # Placeholders: el build no llama a Supabase en tiempo de build, pero
          # evitamos cualquier sorpresa con vars públicas indefinidas.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
